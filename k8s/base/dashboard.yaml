apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: contentos
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: contentos/dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://gateway:8000
            - name: NEXT_PUBLIC_WS_URL
              value: ws://gateway:8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: contentos
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
