# Copy to secret.yaml for local dev only — NEVER commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: contentos-secrets
  namespace: contentos
type: Opaque
stringData:
  JWT_SECRET: replace-me
  POSTGRES_USER: contentos
  POSTGRES_PASSWORD: replace-me
  POSTGRES_DB: contentos
  DATABASE_URL: postgresql+asyncpg://contentos:replace-me@postgres:5432/contentos
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  MINIO_ACCESS_KEY: contentos
  MINIO_SECRET_KEY: replace-me
