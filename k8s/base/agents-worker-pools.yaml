# Celery worker pools — scale per queue group (Tier E4)
# Requires KEDA in cluster for queue-based autoscaling (see keda-scaledobjects.yaml)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-worker-research
  namespace: contentos
  labels:
    app: agents-worker
    pool: research
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents-worker
      pool: research
  template:
    metadata:
      labels:
        app: agents-worker
        pool: research
    spec:
      containers:
        - name: worker
          image: contentos/agents-worker:latest
          command:
            - celery
            - -A
            - contentos_agents.worker
            - worker
            - -l
            - info
            - -Q
            - contentos.research
            - -c
            - "2"
          envFrom:
            - configMapRef:
                name: contentos-config
            - secretRef:
                name: contentos-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
