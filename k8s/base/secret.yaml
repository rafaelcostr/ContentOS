apiVersion: v1
kind: Secret
metadata:
  name: contentos-secrets
  namespace: contentos
type: Opaque
stringData:
  JWT_SECRET: change-me-in-production
  POSTGRES_USER: contentos
  POSTGRES_PASSWORD: contentos_secret
  POSTGRES_DB: contentos
  DATABASE_URL: postgresql+asyncpg://contentos:contentos_secret@postgres:5432/contentos
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  MINIO_ACCESS_KEY: contentos
  MINIO_SECRET_KEY: contentos_secret
