# Gateway production hardening — V5.5.4

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: contentos
spec:
  template:
    spec:
      containers:
        - name: gateway
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "384Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
