# Ingress + TLS (cert-manager). Adjust host and issuer for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contentos
  namespace: contentos
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - contentos.example.com
      secretName: contentos-tls
  rules:
    - host: contentos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
