# CPU fallback HPAs when KEDA is not installed (Tier E4)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agents-worker-research-hpa
  namespace: contentos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agents-worker-research
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
