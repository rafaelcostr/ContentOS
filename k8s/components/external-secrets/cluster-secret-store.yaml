# Example: External Secrets Operator + AWS Secrets Manager
# Install: https://external-secrets.io/latest/
# Replace provider/region/secret key with your backend (Vault, GCP SM, etc.)

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: contentos-aws-sm
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
