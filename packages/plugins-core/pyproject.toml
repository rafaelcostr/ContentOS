[project]
name = "contentos-plugins-core"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0.2",
]

[project.optional-dependencies]
postgres = ["psycopg2-binary>=2.9.10", "sqlalchemy>=2.0.36"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
