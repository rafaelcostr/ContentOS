[project]
name = "contentos-storage"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "contentos-shared",
    "minio>=7.2.0",
    "httpx>=0.28.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
