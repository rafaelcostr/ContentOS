[project]
name = "contentos-growth"
version = "0.1.0"
description = "ContentOS Growth AI domain and orchestration services"
requires-python = ">=3.12"

[project.optional-dependencies]
postgres = ["sqlalchemy>=2.0.36"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
