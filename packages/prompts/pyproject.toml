[project]
name = "contentos-prompts"
version = "0.2.0"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0.2",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
contentos_prompts = ["../../prompts/*.md"]

[tool.setuptools.packages.find]
where = ["src"]
