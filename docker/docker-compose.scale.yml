# Scale workers per queue in production
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.scale.yml up -d

services:
  agents-research:
    extends:
      file: docker-compose.yml
      service: agents-worker
    command: celery -A contentos_agents.worker worker -l info -Q contentos.research -c 2

  agents-script:
    extends:
      file: docker-compose.yml
      service: agents-worker
    command: celery -A contentos_agents.worker worker -l info -Q contentos.script -c 2

  agents-editor:
    extends:
      file: docker-compose.yml
      service: agents-worker
    command: celery -A contentos_agents.worker worker -l info -Q contentos.editor -c 4

  agents-v5-quality:
    extends:
      file: docker-compose.yml
      service: agents-worker
    command: celery -A contentos_agents.worker worker -l info -Q contentos.retention,contentos.seo,contentos.ai_director,contentos.creative_memory,contentos.quality,contentos.video_review,contentos.auto_retry,contentos.content_score -c 2

  agents-v5-media:
    extends:
      file: docker-compose.yml
      service: agents-worker
    command: celery -A contentos_agents.worker worker -l info -Q contentos.asset_index,contentos.media_analyze,contentos.asset_search -c 2

  agents-worker:
    command: celery -A contentos_agents.worker worker -l info -Q contentos.scene,contentos.takes,contentos.voice,contentos.subtitle,contentos.knowledge_base,contentos.publisher,contentos.thumbnail,contentos.analytics,contentos.learning,contentos.content_intelligence,contentos.multi_content,contentos.multi_content_video -c 2
