name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Unit tests
        run: pytest tests/ -v -m "not integration" --ignore=tests/test_api_integration.py
      - name: Validate K8s manifests
        run: |
          kubectl kustomize k8s/base > /dev/null
          kubectl kustomize k8s/overlays/autoscaling-keda > /dev/null
          kubectl kustomize k8s/overlays/autoscaling-cpu > /dev/null
          kubectl kustomize k8s/overlays/staging > /dev/null
          kubectl kustomize k8s/overlays/production > /dev/null

  build-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: docker/Dockerfile.gateway
            context: .
          - service: workflow-engine
            dockerfile: docker/Dockerfile.workflow
            context: .
          - service: agents-worker
            dockerfile: docker/Dockerfile.agent
            context: .
          - service: ai-gateway
            dockerfile: docker/Dockerfile.ai-gateway
            context: .
          - service: dashboard
            dockerfile: apps/dashboard/Dockerfile
            context: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:staging-${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Set image tags for staging
        working-directory: k8s/overlays/staging
        run: |
          IMAGE_ROOT="${{ env.REGISTRY }}/${{ github.repository }}"
          TAG="staging-${{ github.sha }}"
          kustomize edit set image \
            contentos/gateway=${IMAGE_ROOT}/gateway:${TAG} \
            contentos/workflow-engine=${IMAGE_ROOT}/workflow-engine:${TAG} \
            contentos/agents-worker=${IMAGE_ROOT}/agents-worker:${TAG} \
            contentos/ai-gateway=${IMAGE_ROOT}/ai-gateway:${TAG} \
            contentos/dashboard=${IMAGE_ROOT}/dashboard:${TAG}
      - name: Deploy to staging cluster
        env:
          KUBE_CONFIG_DATA: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "Images pushed to GHCR. Set secret STAGING_KUBECONFIG to enable kubectl apply."
            exit 0
          fi
          echo "$KUBE_CONFIG_DATA" | base64 -d > "${RUNNER_TEMP}/kubeconfig"
          export KUBECONFIG="${RUNNER_TEMP}/kubeconfig"
          kubectl apply -k k8s/overlays/staging
          kubectl -n contentos-staging rollout status deployment/gateway --timeout=180s
